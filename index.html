<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón CUC Escucha</title>
    <style>
        html, body {
            background-color: firebrick;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Buzón CUC Escucha</h1>

    <form action="#" method="post">
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="edad">Edad:</label><br>
        <input type="number" id="edad" name="edad" required><br><br>

        <label for="semestre">Semestre:</label><br>
        <input type="number" id="semestre" name="semestre" required><br><br>

        <label for="correo">Correo institucional:</label><br>
        <input type="email" id="correo" name="correo" required><br><br>

        <label for="programa">Programa académico:</label><br>
        <input type="text" id="programa" name="programa" required><br><br>

        <label for="mensaje">PQRS a escribir:</label><br>
        <textarea id="mensaje" name="mensaje" rows="6" cols="40" placeholder="Escribe aquí tu PQRS..." required></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
