<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón CUC Escucha</title>
    <style>
        html, body {
            background-color: firebrick;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Buzón CUC Escucha</h1>

    <form name="buzon-cuc-escucha" method="POST" data-netlify="true" action="/gracias.html">
        <input type="hidden" name="form-name" value="buzon-cuc-escucha">

        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="edad">Edad:</label><br>
        <input type="number" id="edad" name="edad" required><br><br>

        <label for="rol">Rol en la institución:</label><br>
        <select id="rol" name="rol" required onchange="controlarNivelAcademico()">
            <option value="">Seleccione una opción</option>
            <option value="estudiante">Estudiante</option>
            <option value="profesor">Profesor</option>
        </select><br><br>

        <label for="nivel">Nivel académico:</label><br>
        <select id="nivel" name="nivel" disabled>
            <option value="">Seleccione una opción</option>
            <option value="pregrado">Pregrado</option>
            <option value="posgrado">Posgrado</option>
        </select><br><br>

        <label for="semestre">Semestre:</label><br>
        <select id="semestre" name="semestre" required>
        <option value="">Seleccione una opción</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        </select><br><br>

        <label for="correo">Correo institucional:</label><br>
        <input type="email" id="correo" name="correo" required><br><br>

        <label for="programa">Programa académico:</label><br>
        <input type="text" id="programa" name="programa" required><br><br>

        <label for="mensaje">PQRS a escribir:</label><br>
        <textarea id="mensaje" name="mensaje" rows="6" cols="40" placeholder="Escribe aquí tu PQRS..." required></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>
        <script>
        function controlarNivelAcademico() {
            const rol = document.getElementById("rol").value;
            const nivel = document.getElementById("nivel");

            if (rol === "estudiante") {
                nivel.disabled = false;
                nivel.required = true;
            } else {
                nivel.disabled = true;
                nivel.required = false;
                nivel.value = "";
            }
        }
    </script>
</body>
</html>
